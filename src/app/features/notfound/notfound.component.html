<section class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-green-50 flex items-center justify-center px-4 relative overflow-hidden">

  <!-- Background decorative elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-20 -right-20 w-96 h-96 bg-emerald-100 rounded-full opacity-40 blur-3xl"></div>
    <div class="absolute -bottom-20 -left-20 w-96 h-96 bg-green-100 rounded-full opacity-40 blur-3xl"></div>

    <!-- Floating items -->
    <div class="absolute top-20 left-10 text-emerald-200 text-5xl animate-bounce" style="animation-delay: 0s; animation-duration: 3s;">🛒</div>
    <div class="absolute top-40 right-16 text-emerald-200 text-3xl animate-bounce" style="animation-delay: 0.5s; animation-duration: 2.5s;">🍎</div>
    <div class="absolute bottom-32 left-20 text-emerald-200 text-4xl animate-bounce" style="animation-delay: 1s; animation-duration: 3.5s;">🥦</div>
    <div class="absolute bottom-20 right-24 text-emerald-200 text-3xl animate-bounce" style="animation-delay: 1.5s; animation-duration: 2.8s;">🌿</div>
    <div class="absolute top-1/2 left-6 text-emerald-100 text-6xl animate-bounce" style="animation-delay: 0.8s; animation-duration: 4s;">🥕</div>
    <div class="absolute top-1/3 right-8 text-emerald-100 text-5xl animate-bounce" style="animation-delay: 0.3s; animation-duration: 3.2s;">🛍️</div>
  </div>

  <!-- Main Content -->
  <div class="text-center relative z-10 max-w-lg">

    <!-- Cart illustration -->
    <div class="relative inline-block mb-8">
      <div class="w-40 h-40 bg-white rounded-3xl shadow-xl flex items-center justify-center mx-auto border border-emerald-100">
        <i class="fas fa-shopping-cart text-7xl text-emerald-500"></i>
      </div>
      <!-- 404 badge -->
      <div class="absolute -top-4 -right-4 w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center shadow-lg">
        <span class="text-white font-black text-lg">404</span>
      </div>
    </div>

    <!-- Text -->
    <h1 class="text-4xl font-black text-gray-900 mb-3 tracking-tight">
      Oops! Nothing Here
    </h1>
    <p class="text-gray-500 text-lg mb-10 leading-relaxed">
      Looks like this page went out of stock! Don't worry,<br class="hidden sm:block"/>
      there's plenty more fresh content to explore.
    </p>

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-12">
      <a
        routerLink="/"
        class="flex items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-8 py-3.5 rounded-full transition-all duration-200 hover:-translate-y-0.5 shadow-md hover:shadow-lg">
        <i class="fas fa-home"></i> Go to Homepage
      </a>
      <button
        onclick="history.back()"
        class="flex items-center gap-2 bg-white hover:bg-gray-50 text-gray-700 font-bold px-8 py-3.5 rounded-full border border-gray-200 transition-all duration-200 hover:-translate-y-0.5 shadow-sm hover:shadow-md">
        <i class="fas fa-arrow-left"></i> Go Back
      </button>
    </div>

    <!-- Popular Destinations -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
      <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Popular Destinations</p>
      <div class="flex flex-wrap items-center justify-center gap-2">
        <a routerLink="/shop"
          class="px-4 py-2 bg-emerald-50 text-emerald-600 text-sm font-semibold rounded-full hover:bg-emerald-100 transition-colors">
          All Products
        </a>
        <a routerLink="/categories"
          class="px-4 py-2 bg-emerald-50 text-emerald-600 text-sm font-semibold rounded-full hover:bg-emerald-100 transition-colors">
          Categories
        </a>
        <a routerLink="/brands"
          class="px-4 py-2 bg-emerald-50 text-emerald-600 text-sm font-semibold rounded-full hover:bg-emerald-100 transition-colors">
          Brands
        </a>
        <a routerLink="/cart"
          class="px-4 py-2 bg-emerald-50 text-emerald-600 text-sm font-semibold rounded-full hover:bg-emerald-100 transition-colors">
          My Cart
        </a>
      </div>
    </div>

  </div>
</section>
