<div class="min-h-screen bg-gray-50">

  <!-- Green Header -->
  <div class="bg-gradient-to-r from-emerald-500 to-emerald-400 py-10 px-6">
    <div class="container mx-auto">
      <nav class="flex items-center gap-2 text-sm text-emerald-100 mb-4">
        <a routerLink="/" class="hover:text-white transition-colors">Home</a>
        <i class="fa-solid fa-chevron-right text-xs"></i>
        <span class="text-white font-medium">My Account</span>
      </nav>
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center">
          <i class="fa-regular fa-user text-white text-2xl"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white">My Account</h1>
          <p class="text-emerald-100 text-sm">Manage your addresses and account settings</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="container mx-auto px-6 py-10">
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

      <!-- Sidebar -->
      <div class="lg:col-span-1">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div class="px-4 py-4 border-b border-gray-100">
            <p class="text-sm font-bold text-gray-500 uppercase tracking-wider">My Account</p>
          </div>
<ul class="py-2">
  <li>
    <a routerLink="/profile/addresses"
      routerLinkActive="bg-emerald-50 !text-emerald-600"
      [routerLinkActiveOptions]="{exact: true}"
      class="flex items-center justify-between px-4 py-3 text-sm font-semibold text-gray-700 hover:bg-emerald-50 hover:text-emerald-600 transition-colors rounded-xl mx-2">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
          <i class="fa-solid fa-location-dot text-white text-xs"></i>
        </div>
        My Addresses
      </div>
      <i class="fa-solid fa-chevron-right text-xs text-gray-400"></i>
    </a>
  </li>
  <li>
    <a routerLink="/profile/settings"
      routerLinkActive="bg-emerald-50 !text-emerald-600"
      [routerLinkActiveOptions]="{exact: true}"
      class="flex items-center justify-between px-4 py-3 text-sm font-semibold text-gray-700 hover:bg-emerald-50 hover:text-emerald-600 transition-colors rounded-xl mx-2">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center">
          <i class="fa-solid fa-gear text-gray-500 text-xs"></i>
        </div>
        Settings
      </div>
      <i class="fa-solid fa-chevron-right text-xs text-gray-400"></i>
    </a>
  </li>
</ul>
        </div>
      </div>

      <!-- Main Content (router-outlet or child component) -->
      <div class="lg:col-span-3">
        <router-outlet />
      </div>

    </div>
  </div>
</div>
